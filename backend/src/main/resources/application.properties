# ===========================================
# CONFIGURATION DU SERVEUR
# ===========================================
spring.application.name=backend
server.port=8080

# ===========================================
# CONFIGURATION BASE DE DONNEES (MySQL/MariaDB - XAMPP)
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_stock_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# CONFIGURATION JPA / HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===========================================
# CONFIGURATION JACKSON (JSON)
# ===========================================
spring.jackson.serialization.fail-on-empty-beans=false
# spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

# ===========================================
# CONFIGURATION LOGS
# ===========================================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.gestionstock=DEBUG

# ===========================================
# CONFIGURATION JWT (utilis� plus tard)
# ===========================================
jwt.secret=ZXlKaGJHY2lPaUpJVXpJMU5pSjkuU2VjcmV0S2V5Rm9yR2VzdGlvblN0b2NrQXBwbGljYXRpb24yMDI2VmVyeUxvbmdTZWN1cmVTdHJpbmc=
jwt.expiration=86400000

# ===========================================
# CONFIGURATION CORS (frontend Angular)
# ===========================================
cors.allowed-origins=http://localhost:4200

# ===========================================
# UPLOAD FICHIERS
# ===========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB